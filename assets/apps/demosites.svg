      <text x="72" y="32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#0f172a">Basis</text>
      <text x="72" y="66" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#0f172a">4 900</text>
      <rect x="30" y="88" width="85" height="18" rx="7" fill="none" stroke="#0f9f8f"/>
    </g>
    <g transform="translate(247 438)">
