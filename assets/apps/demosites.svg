<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">DemoSites nettsidepakker</title>
  <desc id="desc">Lys demoillustrasjon for nettsidepakker med landingsside, kontaktskjema og prisplaner.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
