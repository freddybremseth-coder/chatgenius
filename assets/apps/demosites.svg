    <text x="58" y="205" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="900" fill="#0f172a">nettsider som skaper</text>
    <text x="58" y="246" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="900" fill="#0f9f8f">resultater</text>
