    <text x="454" y="146" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900" fill="#0f172a">Få tilbud</text>
    <rect x="454" y="165" width="112" height="18" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="454" y="193" width="112" height="18" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="454" y="221" width="112" height="44" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="454" y="276" width="112" height="22" rx="7" fill="url(#teal)"/>
