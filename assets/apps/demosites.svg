      <stop offset="0.55" stop-color="#eefcf8"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="160" cy="120" r="3" fill="#99f6e4" opacity="0.9"/>
  <circle cx="205" cy="120" r="3" fill="#99f6e4" opacity="0.75"/>
  <circle cx="250" cy="120" r="3" fill="#99f6e4" opacity="0.55"/>
  <circle cx="160" cy="165" r="3" fill="#99f6e4" opacity="0.75"/>
  <circle cx="205" cy="165" r="3" fill="#99f6e4" opacity="0.55"/>
  <circle cx="250" cy="165" r="3" fill="#99f6e4" opacity="0.35"/>
