    <text x="112" y="82" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#0f9f8f">Nettsidepakker</text>
    <text x="0" y="160" font-family="Inter, Arial, sans-serif" font-size="28" fill="#475569">Ferdige nettsider, klare for</text>
    <text x="0" y="198" font-family="Inter, Arial, sans-serif" font-size="28" fill="#475569">lansering og vekst.</text>
