      <rect x="0" y="0" width="145" height="22" rx="12" fill="url(#teal)"/>
      <text x="72" y="15" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="900" fill="white">Mest valgt</text>
      <text x="72" y="48" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#0f9f8f">Standard</text>
      <text x="72" y="82" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#0f172a">7 900</text>
      <rect x="30" y="102" width="85" height="18" rx="7" fill="url(#teal)"/>
    </g>
    <g transform="translate(422 450)">
      <rect x="0" y="0" width="145" height="118" rx="14" fill="white" stroke="#e2e8f0"/>
      <text x="72" y="32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#0f172a">Premium</text>
      <text x="72" y="66" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#0f172a">14 900</text>
      <rect x="30" y="88" width="85" height="18" rx="7" fill="none" stroke="#0f9f8f"/>
