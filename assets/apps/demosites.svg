    <rect x="29" y="31" width="12" height="8" rx="2" fill="#0f766e"/>
    <rect x="45" y="31" width="12" height="8" rx="2" fill="#0f766e"/>
    <rect x="29" y="44" width="28" height="5" rx="2.5" fill="#0f766e" opacity="0.75"/>
